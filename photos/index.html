<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Photos | Jooyeon Park</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../style.css" />
</head>

<body>

  <nav class="navbar">
    <a href="../index.html">Home</a>
    <a href="../research/index.html">Research</a>
    <a href="../publications/index.html">Publications</a>
    <a href="../equipment/index.html">Experimental Skills</a>
    <a class="active" href="./index.html">Photos</a>
    <a href="../news/index.html">News</a>
  </nav>

  <main class="page photos-page">

    <section class="intro-section research-hero">
      <h1 class="page-title">Photos</h1>
    </section>

    <section class="photo-grid" aria-label="Photo gallery">

      <button class="photo-card" type="button" aria-label="Lab Experiments">
        <img src="../images/photos/w50_g50_7cm_craters.jpg" alt="Lab experiments">
        <span class="photo-card-title">Craters</span>
      </button>

      <button class="photo-card" type="button" aria-label="Flow Visualization">
        <img src="../images/photos/particle-mist.jpg" alt="Flow visualization">
        <span class="photo-card-title">Particle agglomeration by humid air</span>
      </button>

      <button class="photo-card" type="button" aria-label="Granular Materials">
        <img src="../images/photos/aggregated-ice.jpg" alt="Granular materials">
        <span class="photo-card-title">Aggregated ice beads</span>
      </button>

      <button class="photo-card" type="button" aria-label="Droplet Impact">
        <img src="../images/photos/inner-ring.jpg" alt="Droplet impact">
        <span class="photo-card-title">Wine drop on a paper</span>
      </button>

      <button class="photo-card" type="button" aria-label="Particle Aggregates">
        <img src="../images/photos/filament.jpg" alt="Particle aggregates">
        <span class="photo-card-title">PEO filament</span>
      </button>

      <button class="photo-card" type="button" aria-label="Wind Tunnel">
        <img src="../images/photos/contact-angle.jpg" alt="Wind tunnel">
        <span class="photo-card-title">Water drop on PTFE/Si powder layers</span>
      </button>

    </section>

  </main>

  <footer>
    <p>© 2026 Jooyeon Park</p>
  </footer>

  <script>
    const photoCards = document.querySelectorAll('.photo-card');

    photoCards.forEach((card) => {
      card.addEventListener('click', () => {
        const alreadyActive = card.classList.contains('is-active');
        photoCards.forEach((item) => item.classList.remove('is-active'));
        if (!alreadyActive) {
          card.classList.add('is-active');
        }
      });
    });

    document.addEventListener('click', (event) => {
      if (!event.target.closest('.photo-card')) {
        photoCards.forEach((item) => item.classList.remove('is-active'));
      }
    });
  </script>

</body>
</html>
